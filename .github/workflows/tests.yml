name: Tests

on:
  pull_request:
  push:
    branches: [main, test]
  merge_group:

jobs:
  packaging:
    name: Python packaging
    permissions:
      contents: read
    uses: tskit-dev/.github/.github/workflows/python-packaging.yml@v18
    with:
      cli-test-cmd: tsdate --help

  test:
    name: Python
    permissions:
      contents: read
    uses: tskit-dev/.github/.github/workflows/python-tests.yml@v18
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python }}
      coverage-directory: tsdate
    # tskit-dev/* reusable workflows are first-party and trusted (see
    # .github/zizmor.yml); the called workflow needs CODECOV_TOKEN to upload
    # coverage, so inheriting secrets is intentional here.
    secrets: inherit  # zizmor: ignore[secrets-inherit]
    strategy:
      matrix:
        python: ["3.11", "3.13"]
        os: [macos-latest, ubuntu-24.04, windows-latest]
